<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <link rel="icon" href="%PUBLIC_URL%/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#DC2626" />
    <meta name="description" content="RAKSHA - Emergency Response Platform. Instant SOS, ambulance tracking, and first aid guidance." />
    <meta name="keywords" content="emergency, ambulance, SOS, first aid, RAKSHA, 108" />
    <meta name="author" content="RAKSHA Emergency Platform" />

    <!-- PWA -->
    <link rel="manifest" href="%PUBLIC_URL%/manifest.json" />
    <link rel="apple-touch-icon" href="%PUBLIC_URL%/logo192.png" />

    <!-- Mobile Web App -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="RAKSHA" />

    <!-- Open Graph -->
    <meta property="og:title" content="RAKSHA Emergency Response" />
    <meta property="og:description" content="Instant emergency response platform with live ambulance tracking" />
    <meta property="og:type" content="website" />

    <!-- Preconnect for fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin="" />

    <title>RAKSHA - Emergency Response Platform</title>

    <style>
      /* Critical CSS for initial load */
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: #0a0a0f;
        color: #ffffff;
        font-family: 'Inter', system-ui, sans-serif;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
      }
      #root {
        min-height: 100vh;
        min-height: 100dvh;
      }
      /* Loading screen */
      .initial-loader {
        position: fixed;
        inset: 0;
        background: #0a0a0f;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        z-index: 9999;
      }
      .initial-loader h1 {
        font-size: 2.5rem;
        font-weight: 900;
        letter-spacing: 0.3em;
        background: linear-gradient(135deg, #ef4444, #dc2626, #f97316);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 0.5rem;
      }
      .initial-loader p {
        color: #6b7280;
        font-size: 0.875rem;
      }
      .loader-ring {
        width: 40px;
        height: 40px;
        border: 3px solid rgba(220, 38, 38, 0.2);
        border-top-color: #dc2626;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin-bottom: 1.5rem;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <noscript>
      <div style="background:#0a0a0f;color:#fff;text-align:center;padding:2rem;">
        <h1 style="color:#dc2626">RAKSHA</h1>
        <p>JavaScript is required to run RAKSHA Emergency Platform.</p>
        <p>For emergencies, call <a href="tel:108" style="color:#dc2626">108</a></p>
      </div>
    </noscript>

    <div id="root">
      <!-- Initial loading screen -->
      <div class="initial-loader" id="initial-loader">
        <div class="loader-ring"></div>
        <h1>RAKSHA</h1>
        <p>Emergency Response Platform</p>
      </div>
    </div>

    <script>
      // Remove loader when React mounts
      window.addEventListener('load', function() {
        setTimeout(function() {
          var loader = document.getElementById('initial-loader');
          if (loader) {
            loader.style.opacity = '0';
            loader.style.transition = 'opacity 0.3s ease';
            setTimeout(function() { loader.remove(); }, 300);
          }
        }, 500);
      });
    </script>
  </body>
</html>
